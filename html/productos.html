<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos - Serviopción</title>
    <link rel="stylesheet" href="../css/estilo.css">
</head>
<body>
    <div class="contenedor-dashboard">
        <!-- MENÚ LATERAL -->
        <div class="menu-lateral">
            <h2> Serviopción</h2>
            
            <ul>
                <li><a href="dashboard.html"> Dashboard</a></li>
                <li><a href="productos.html" class="activo">Productos</a></li>
                <li><a href="proveedores.html">Proveedores</a></li>
                <li><a href="admin-usuarios.html" id="linkAdminUsuarios" style="display: none;">Admin Usuarios</a></li>
                <li><a href="admin-logs.html" id="linkAdminLogs" style="display: none;">Admin Logs</a></li>
            </ul>
            
            <div class="info-usuario">
                <p><strong id="nombreUsuario">Usuario</strong></p>
                <p id="rolUsuario">Rol</p>
                <button onclick="cerrarSesion()" style="margin-top: 15px; background: #e74c3c;">
                    🚪 Cerrar Sesión
                </button>
            </div>
        </div>

        <!-- CONTENIDO PRINCIPAL -->
        <div class="contenido-principal">
            <div class="cabecera">
                <h1>Gestión de Productos</h1>
                <p>Administra tu inventario de productos</p>
            </div>

            <!-- TABLA DE PRODUCTOS -->
            <div class="contenedor-tabla">
                <div class="barra-busqueda">
                    <input type="text" id="buscarProducto" placeholder=" Buscar producto...">
                    <button id="btnAgregarProducto" class="btn-agregar" onclick="abrirModalAgregar()">
                        + Agregar Producto
                    </button>
                </div>

                <table id="tablaProductos">
                    <thead>
                        <tr>
                            <th>Código</th>
                            <th>Producto</th>
                            <th>Descripción</th>
                            <th>Categoría</th>
                            <th>Precio</th>
                            <th>Stock</th>
                            <th>Stock Mínimo</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="cuerpoTablaProductos">
                        <!-- Se llena con JavaScript -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- MODAL PARA AGREGAR/EDITAR PRODUCTO -->
    <div id="modalProducto" class="modal">
        <div class="modal-contenido">
            <h2 id="tituloModal">Agregar Producto</h2>
            
            <form id="formularioProducto">
                <div class="campo">
                    <label>Código:</label>
                    <input type="text" id="codigo" required>
                </div>
                
                <div class="campo">
                    <label>Producto:</label>
                    <input type="text" id="producto" required>
                </div>

                <div class="campo">
                    <label>Descripción:</label>
                    <textarea id="descripcion" rows="3" maxlength="500" required></textarea>
                </div>
                
                <div class="campo">
                    <label>Categoría:</label>
                    <input type="text" id="categoria" list="listaCategorias" required>
                    <datalist id="listaCategorias"></datalist>
                </div>
                
                <div class="campo">
                    <label>Precio:</label>
                    <input type="number" id="precio" required>
                </div>
                
                <div class="campo">
                    <label>Stock Inicial:</label>
                    <input type="number" id="stock" min="0" required>
                </div>

                <div class="campo">
                    <label>Stock Mínimo:</label>
                    <input type="number" id="stockMinimo" min="0" value="5" required>
                </div>
                
                <div class="campo">
                    <label>Estado:</label>
                    <select id="estado" required>
                        <option value="Disponible">Disponible</option>
                        <option value="Stock Bajo">Stock Bajo</option>
                        <option value="Sin Stock">Sin Stock</option>
                    </select>
                </div>
                
                <div class="botones-modal">
                    <button type="button" class="btn-cancelar" onclick="cerrarModal()">
                        Cancelar
                    </button>
                    <button type="submit" class="btn-guardar">
                        Guardar
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/datos.js"></script>
    <script src="../js/productos.js"></script>
</body>
</html>
